name: ci

on:
  push:
  pull_request:

jobs:
  audit:
    name: Brand + icon audits (end-to-end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Source-level audits — pure-Node, no install needed. Each step
      # exits non-zero with actionable remediation; if any of these fail
      # the build stops here and the message tells you what to change.
      - name: Brand audit — no stray "Mement0", every product mention uses MementØ
        run: |
          node scripts/audit-branding.mjs || {
            echo "::error::Brand audit failed. Update src/lib/brand-meta.ts or the offending file, or add the path to ALLOW in scripts/audit-branding.mjs if intentional.";
            exit 1;
          }
      - name: Share-image audit — og:image / twitter:image must come from brand-meta.ts
        run: |
          node scripts/test-share-images.mjs || {
            echo "::error::Share-image audit failed. Edit src/lib/brand-meta.ts BRAND.ogImage.path (local /public file only). Do NOT inline og:image / twitter:image in any route.";
            exit 1;
          }
      - name: Icon audit — source references (__root.tsx + brand-meta.ts)
        run: node scripts/audit-icons.mjs
      - name: Manifest audit — public/manifest.webmanifest
        run: node scripts/audit-manifest.mjs

      - name: Install deps
        run: bun install --frozen-lockfile

      # Clean any cached/generated artifacts before the prod build so stale
      # metadata (.output, .nitro, dist, vite cache) can never be reused.
      - name: Clean build artifacts
        run: bun run clean
      - name: Build (production)
        run: bun run vite build

      - name: Icon audit — built bundle (.output/public / dist)
        run: node scripts/audit-dist-icons.mjs
      - name: Manifest audit — built bundle
        run: node scripts/audit-manifest.mjs
      - name: Share-image test — post-build re-check
        run: node scripts/test-share-images.mjs

      # Playwright end-to-end checks against the running preview.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Icon playwright check (200 + content-type + dimensions, incl. social cards)
        run: node scripts/check-icons-playwright.mjs
      - name: Amber/ember CSS audit (rendered homepage)
        run: node scripts/check-amber-playwright.mjs
